name: UI_Automation

on:
  schedule:
    - cron: "00 18 * * *"
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: maven
      - name: Running test automation framework with maven
        run: mvn test -Dbrowser=chrome -DisLambdaTest=false -DisHeadless=true

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test logs
          path: logs/

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/

      - name: Upload html report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: report.html

      - name: Test Execution Completed
        run: echo "Test Execution Completed"    

      - name: Copy Report to gh-pages Folder
        if: always()
        run: |
          mkdir -p public/extent-reports
          cp -R report.html public/extent-reports/
          cp -R screenshots/ public/extent-reports/screenshots/
          ls -l

      - name: Deploy to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public/extent-reports/
          token: ${{ secrets.PAT1991 }}
          clean: true
